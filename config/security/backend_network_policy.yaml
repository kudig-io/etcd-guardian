apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: etcdguardian-backend-network-policy
  namespace: etcd-guardian-system
  labels:
    app.kubernetes.io/name: etcdguardian
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: etcdguardian
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etcdguardian
              app.kubernetes.io/component: web-ui
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 2379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

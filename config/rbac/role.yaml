apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcdguardian-manager-role
  labels:
    app.kubernetes.io/name: etcdguardian
    app.kubernetes.io/component: controller
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdbackups
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdbackups/finalizers
    verbs:
      - update
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdbackups/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdrestores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdrestores/finalizers
    verbs:
      - update
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdrestores/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdbackupschedules
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdbackupschedules/finalizers
    verbs:
      - update
  - apiGroups:
      - etcdguardian.io
    resources:
      - etcdbackupschedules/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update

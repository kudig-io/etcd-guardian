apiVersion: v1
kind: ConfigMap
metadata:
  name: etcdguardian-config
  namespace: etcd-guardian-system
  labels:
    app.kubernetes.io/name: etcdguardian
    app.kubernetes.io/component: config
data:
  controller_manager_config.yaml: |
    apiVersion: controller-runtime.sigs.k8s.io/v1alpha1
    kind: ControllerManagerConfig
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8080
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: etcdguardian.io
      resourceNamespace: etcd-guardian-system
    controller:
      groupKindConcurrency:
        EtcdBackup.etcdguardian.io: 5
        EtcdRestore.etcdguardian.io: 3
        EtcdBackupSchedule.etcdguardian.io: 2
